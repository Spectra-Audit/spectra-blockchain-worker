# Spectra Blockchain Worker - Railway Deployment Configuration
# Runs smart contract audits using claude-code CLI with GLM API

[build]
# Build configuration for Docker-based deployment
buildCommand = "docker build -t spectra-blockchain-worker ."

# Health check configuration
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
# Start command - use entrypoint script that configures claude-code at startup
# The entrypoint script runs setup_claude_code.sh with Railway env vars, then starts server.py
startCommand = "/app/entrypoint.sh"

# Environment detection (Railway sets this automatically)
[deploy.env]
# ==============================================================================
# GLM API Configuration (via api.z.ai proxy)
# ==============================================================================
#
# Two endpoints are provided by api.z.ai:
# 1. OpenAI-compatible endpoint: https://api.z.ai/v1/chat/completions
#    - Used by: contract_audit_scout, unified_glm_orchestrator
#    - Format: OpenAI chat completions API
#
# 2. Anthropic-compatible endpoint: https://api.z.ai/api/anthropic
#    - Used by: claude-code CLI (ClaudeCodeOrchestrator)
#    - Format: Anthropic messages API
#
# IMPORTANT: Set both GLM_API_KEY and ANTHROPIC_AUTH_TOKEN to the same value
# for both direct API calls and claude-code CLI to work.
# ==============================================================================

# OpenAI-compatible endpoint for direct GLM API calls
GLM_API_KEY = "27f74769564f4f4a88bf22e812d0bb50.tKidddXu225ZMNdJ"
GLM_API_URL = "https://api.z.ai/v1/chat/completions"
GLM_MODEL = "glm-4.7"

# Anthropic-compatible endpoint for claude-code CLI
# Note: setup_claude_code.sh prefers ANTHROPIC_* variables for CLI compatibility
ANTHROPIC_AUTH_TOKEN = "27f74769564f4f4a88bf22e812d0bb50.tKidddXu225ZMNdJ"
ANTHROPIC_BASE_URL = "https://api.z.ai/api/anthropic"

# Blockchain RPC Configuration
RPC_HTTP_URL = "https://eth.llamarpc.com"
RPC_WS_URLS = ""  # Optional: comma-separated WebSocket URLs

# Smart Contract Addresses
CONTRACT_ADDRESS = "0xe6733635aF5Ce7a1E022fbD87670EADa95397558"  # VeritaStaking contract (ProScout)
VERITAS_STAKING_ADDRESS = "0xe6733635aF5Ce7a1E022fbD87670EADa95397558"  # Same contract for staking verification
PAYMENTS_CONTRACT_ADDRESS = "0x9b64a162B497F0581Bf7B7B8B7471640b035B6C6"  # VeritaPaymentsAndBids contract (FeaturedScout, PaymentVerifierScout)

CHAIN_ID = "1"

# Backend API Configuration
# NOTE: Use hardcoded URL for Railway. Service references like {{service.RAILWAY_PUBLIC_URL}}
# will NOT work because they aren't expanded at build time.
# The blockchain worker calls the backend to send audit results.
# For local testing, use http://localhost:8000
# For Railway, use the actual backend URL or leave empty to run without backend integration
API_BASE_URL = ""  # Set to actual backend URL or leave empty for standalone mode
# Admin Wallet Configuration for SIWE Authentication
# Generated wallet for blockchain worker authentication with backend API
ADMIN_ACCESS_TOKEN = ""  # Set in Railway dashboard or via secret
ADMIN_WALLET_ADDRESS = "0x808B25bC600f9B963A667a551fab4C039B834157"
ADMIN_WALLET_PRIVATE_KEY = ""  # Mark as SECRET

# Database & Caching
DB_PATH = "/app/data/scout.db"
POLL_INTERVAL_SEC = "12"
REORG_CONF = "5"

# Logging
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"

# Non-interactive mode for Railway deployment
SCOUT_SKIP_WALLET_PROMPT = "1"

# Celery/Task Configuration (if using)
CELERY_BROKER_URL = "redis://localhost:6379/0"
CELERY_RESULT_BACKEND = "redis://localhost:6379/0"

# Claude Code CLI Configuration
# Note: These are fallback values. The actual model is set by GLM_MODEL
CLAUDE_MODEL = "glm-4.7"
CLAUDE_MAX_TOKENS = "4096"
CLAUDE_TEMPERATURE = "0.1"

# Etherscan API for fetching verified contract source code
# Get your free API key from https://etherscan.io/myapikey
ETHERSCAN_API_KEY = ""  # Set in Railway dashboard or via secret

# Internal API secret for backend communication
# Set this to a secure random string if using backend integration
INTERNAL_API_SECRET = ""
