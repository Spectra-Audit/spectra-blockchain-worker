# Spectra Blockchain Worker - Railway Deployment Configuration
# Runs smart contract audits using claude-code CLI with GLM API

[build]
# Build configuration for Docker-based deployment
buildCommand = "docker build -t spectra-blockchain-worker ."

# Health check configuration
[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 30
# Start command - use unified API server with audit orchestrator
startCommand = "python server.py"

# Environment detection (Railway sets this automatically)
[deploy.env]
# GLM API Configuration (Chinese LLM provider)
GLM_API_KEY = ""  # Set in Railway dashboard or via secret
GLM_API_URL = "https://api.z.ai/api/anthropic"
GLM_MODEL = "glm-4.7"

# Alternative: Set as ANTHROPIC_* for claude-code CLI compatibility
ANTHROPIC_AUTH_TOKEN = "${GLM_API_KEY}"
ANTHROPIC_BASE_URL = "${GLM_API_URL}"

# Blockchain RPC Configuration
RPC_HTTP_URL = "https://eth.llamarpc.com"
RPC_WS_URLS = ""  # Optional: comma-separated WebSocket URLs
CONTRACT_ADDRESS = "0x..."  # Your featured contract address
CHAIN_ID = "1"

# Backend API Configuration
# NOTE: Use hardcoded URL for Railway. Service references like {{service.RAILWAY_PUBLIC_URL}}
# will NOT work because they aren't expanded at build time.
# The blockchain worker calls the backend to send audit results.
# For local testing, use http://localhost:8000
# For Railway, use the actual backend URL or leave empty to run without backend integration
API_BASE_URL = ""  # Set to actual backend URL or leave empty for standalone mode
ADMIN_ACCESS_TOKEN = ""  # Set in Railway dashboard or via secret

# Database & Caching
DB_PATH = "/app/data/scout.db"
POLL_INTERVAL_SEC = "12"
REORG_CONF = "5"

# Logging
LOG_LEVEL = "INFO"
LOG_FORMAT = "json"

# Non-interactive mode for Railway deployment
SCOUT_SKIP_WALLET_PROMPT = "1"

# Celery/Task Configuration (if using)
CELERY_BROKER_URL = "redis://localhost:6379/0"
CELERY_RESULT_BACKEND = "redis://localhost:6379/0"

# Claude Code CLI Configuration
CLAUDE_MODEL = "glm-4.7"
CLAUDE_MAX_TOKENS = "4096"
CLAUDE_TEMPERATURE = "0.1"
